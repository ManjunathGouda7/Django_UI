name: GRL Centralized Automation Platform CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017

      redis:
        image: redis:7.0-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r FastAPI_MongoDB/requirements.txt
        pip install django djangorestframework python-dotenv

    - name: Run Django System Check
      env:
        PYTHONPATH: ${{ github.workspace }}
        DJANGO_SECRET_KEY: ci-test-secret-key-placeholder
        DJANGO_DEBUG: "True"
        MONGO_USER: admin
        MONGO_PASS: password
        MONGO_HOST: localhost
        MONGO_PORT: 27017
        REDIS_HOST: localhost
        REDIS_PORT: 6379
        REDIS_PASS: password
      run: |
        cd UI_Automation_Development
        python manage.py check

    - name: Run django test suite
      env:
        PYTHONPATH: ${{ github.workspace }}
        DJANGO_SECRET_KEY: ci-test-secret-key-placeholder
        DJANGO_DEBUG: "True"
        MONGO_USER: admin
        MONGO_PASS: password
        MONGO_HOST: localhost
        MONGO_PORT: 27017
        REDIS_HOST: localhost
        REDIS_PORT: 6379
        REDIS_PASS: password
      run: |
        cd UI_Automation_Development
        python manage.py test grl_api
